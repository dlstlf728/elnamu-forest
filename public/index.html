<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대나무숲</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== 숲 페이지 (메인) ===== -->
  <div id="forestPage" class="page active">
    <nav class="nav">
      <span class="nav-title">대나무숲</span>
      <div class="nav-right">
        <button id="soundToggle" class="nav-btn nav-sound" title="소리 켜기">🔇</button>
        <button id="goLogBtn" class="nav-btn">로그</button>
      </div>
    </nav>

    <!-- 타이틀 + 설명 -->
    <div class="hero">
      <h1 class="hero-title">대나무숲</h1>
      <p class="hero-desc">
        완전 익명 · IP 추적 없음 · 쿠키 없음<br>
        작성 후 5분 이내 삭제 가능 · 페이지를 떠나면 삭제 불가
      </p>
      <div id="weatherBadge" class="weather-badge"></div>
    </div>

    <div class="forest-stage">
      <span class="tree tree-1">🌲</span>
      <span class="tree tree-2">🌳</span>
      <span class="tree tree-3">🌴</span>
      <span class="tree tree-4">🌲</span>
      <span class="tree tree-5">🌳</span>
      <span class="tree tree-6">🌵</span>
      <span class="tree tree-7">🌲</span>
      <span class="tree tree-8">🪾</span>
      <span class="tree tree-9">🌴</span>
      <span class="tree tree-10">🌳</span>
      <span class="tree tree-11">🌲</span>
      <span class="tree tree-12">🌵</span>
      <span class="tree tree-13">🪾</span>
      <span class="tree tree-14">🌳</span>
      <span class="tree tree-15">🌲</span>

      <div id="echoContainer" class="echo-container"></div>

      <p id="forestEmpty" class="forest-empty" style="display:none;">
        오늘은 아직 아무도 소리치지 않았어요...
      </p>
    </div>

    <div class="write-dock">
      <div class="write-dock-inner">
        <textarea
          id="postInput"
          placeholder="대표님 귀는 당나귀 귀"
          maxlength="500"
          rows="2"
        ></textarea>
        <div class="write-dock-footer">
          <span class="char-count"><span id="charCount">0</span>/500</span>
          <button id="submitBtn" class="pixel-btn">소리치기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 로그 페이지 ===== -->
  <div id="logPage" class="page">
    <nav class="nav">
      <button id="goForestBtn" class="nav-btn">숲</button>
      <span class="nav-title">대나무숲 로그</span>
    </nav>

    <!-- 날짜 선택 바 -->
    <div class="date-bar">
      <button id="datePrevBtn" class="date-nav-btn">&lt;</button>
      <span id="dateLabel" class="date-label">오늘</span>
      <button id="dateNextBtn" class="date-nav-btn">&gt;</button>
    </div>

    <div class="log-container">
      <div id="logList" class="log-list"></div>
      <p id="logEmpty" class="forest-empty" style="display:none;">
        이 날에는 기록이 없어요.
      </p>
    </div>
  </div>

  <!-- ===== 메시지 팝업 모달 ===== -->
  <div id="postModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <button id="modalClose" class="modal-close">x</button>
      <div id="modalContent" class="modal-content"></div>
      <div id="modalReactions" class="modal-reactions"></div>
      <div id="modalReplies" class="modal-replies"></div>
      <div class="modal-reply-form">
        <input id="modalReplyInput" type="text" placeholder="답글을 남겨보세요..." maxlength="200">
        <button id="modalReplyBtn" class="pixel-btn pixel-btn-sm">답글</button>
      </div>
    </div>
  </div>

  <!-- 날씨 효과 레이어 (body 직속, fixed) -->
  <div id="weatherLayer" class="weather-layer"></div>

  <!-- Pretext: DOM-free 텍스트 레이아웃 엔진 -->
  <script type="module">
    import * as pretext from 'https://esm.sh/@chenglou/pretext';
    window.pretext = pretext;
    window.dispatchEvent(new Event('pretext-loaded'));
  </script>

  <script src="audio.js"></script>
  <script src="app.js"></script>
</body>
</html>
